name: CI
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        webpack: ['5']
    name: CI
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm install
      - run: npm install webpack@${{ matrix.webpack }}
      - run: npm run lint
      - run: npm test
